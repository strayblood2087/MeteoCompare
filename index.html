<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METEO COMPARE | Multi-Modèles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 min-h-screen font-sans text-slate-800">

    <div class="container mx-auto px-4 py-10">
        <header class="text-center mb-10 text-white">
            <h1 class="text-5xl font-black mb-4 tracking-tighter italic uppercase">
                Meteo<span class="text-indigo-500">Compare</span>
            </h1>
            <p class="text-slate-400 italic">Comparateur haute performance.</p>
        </header>

        <div id="searchSection" class="max-w-2xl mx-auto mb-16">
            <form id="weatherForm" class="flex flex-col md:flex-row gap-3 p-2 bg-white/5 rounded-2xl border border-white/20 shadow-2xl backdrop-blur-md">
                <div class="flex-grow flex items-center px-4">
                    <i class="fas fa-search text-slate-500 mr-3"></i>
                    <input id="cityInput" type="text" placeholder="Entrez une ville..." 
                           class="w-full bg-transparent border-none focus:ring-0 py-4 outline-none text-white text-xl placeholder:text-slate-600">
                </div>
                <button type="submit" id="searchBtn" 
                        class="bg-indigo-600 text-white px-8 py-4 rounded-xl hover:bg-indigo-500 font-black transition-all active:scale-95 md:w-auto w-full whitespace-nowrap shadow-lg shadow-indigo-500/20">
                    COMPARER
                </button>
            </form>
        </div>

        <div id="resultsArea" class="hidden">
            <h2 id="displayCity" class="text-3xl font-bold text-white text-center mb-12 flex items-center justify-center gap-3"></h2>
            <div id="weatherGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="detailArea" class="hidden max-w-2xl mx-auto">
            <button onclick="backToGrid()" class="mb-6 text-indigo-400 hover:text-indigo-300 font-bold flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Retour
            </button>
            <div id="detailContent"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
